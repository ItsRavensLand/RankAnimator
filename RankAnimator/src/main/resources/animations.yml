# -------------------------------------------------------
# RankAnimator - animations.yml
#
# Define your animations here. Each animation has a name,
# a list of frames, and an interval (ticks between frames).
# 20 ticks = 1 second.
#
# Color codes: use & followed by 0-9 or a-f
# Formatting:  &l Bold  &o Italic  &m Strike  &k Magic  &r Reset
#
# Always end each frame with &r so the player name
# after the prefix stays unaffected by your colors.
#
# Example:
#   animations:
#     owner_flash:
#       interval: 5
#       frames:
#         - "&4[&6O&4WNER]&r "
#         - "&4[O&6W&4NER]&r "
#         - "&4[OW&6N&4ER]&r "
#         - "&4[OWN&6E&4R]&r "
#         - "&4[OWNE&6R&4]&r "
#         - "&4[OWNER]&r "
# -------------------------------------------------------

animations:
  developer:
    interval: 5
    frames:
      - "[&6D&4EVELOPER&r] "
      - "[&6D&4EVELOPER&r] "
      - "[&4D&6E&4VELOPER&r] "
      - "[&4D&6E&4VELOPER&r] "
      - "[&4DE&6V&4ELOPER&r] "
      - "[&4DE&6V&4ELOPER&r] "
      - "[&4DEV&6E&4LOPER&r] "
      - "[&4DEV&6E&4LOPER&r] "
      - "[&4DEVE&6L&4OPER&r] "
      - "[&4DEVE&6L&4OPER&r] "
      - "[&4DEVEL&6O&4PER&r] "
      - "[&4DEVEL&6O&4PER&r] "
      - "[&4DEVELO&6P&4ER&r] "
      - "[&4DEVELO&6P&4ER&r] "
      - "[&4DEVELOP&6E&4R&r] "
      - "[&4DEVELOP&6E&4R&r] "
      - "[&4DEVELOPE&6R&r] "
      - "[&4DEVELOPE&6R&r] "
      - "[&4DEVELOPER&r] "
      - "[&4DEVELOPER&r] "
      - "[&4DEVELOPER&r] "
      - "[&4DEVELOPER&r] "
